# ============================================================================
# Shared defaults for all experiment configs
# ============================================================================
# Each experiment config inherits from this file via ``_base: _defaults.yaml``
# and only overrides the fields that differ.
#
# Unified hyperparameters:
#   - 300 epochs, early stopping patience=70 (class-1 IoU)
#   - AdamW lr=5e-4, CosineAnnealing eta_min=1e-6
#   - num_workers=8
# ============================================================================

data:
  data_dir: "/root/autodl-tmp/datasets/185_9bands"
  image_dir: "images"
  mask_dir: "masks"
  num_channels: 4
  num_classes: 2
  image_size: 512
  crop_size: 384
  band_indices: [0, 2, 4, 5]
  use_sharpen: false
  sharpen_sigma: 1.0
  sharpen_alpha: 1.5

train:
  batch_size: 32
  num_epochs: 300
  optimizer: "adamw"
  lr: 5.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  eta_min: 1.0e-6
  use_warmup: false
  warmup_epochs: 5
  warmup_start_factor: 0.01
  loss: "ce_dice"
  ce_weight: 0.5
  dice_weight: 0.5
  save_interval: 99999
  early_stopping_patience: 70
  val_interval: 1
  num_workers: 8
  pin_memory: true

  augment:
    horizontal_flip: true
    vertical_flip: true
    random_rotation: true
    elastic_transform: false
    gaussian_noise: false

eval:
  visualize: true
  num_vis_samples: 10
  vis_bands: [0, 4, 8]

# Shared model defaults (deep-merged into every config's `model:` block, so these
# switches are available in all configs without editing each one).
model:
  # Load ImageNet weights for the whole encoder backbone.
  encoder_pretrained: true
  # Whether the encoder's INPUT conv copies ImageNet weights for its first 3
  # channels. Set to false to randomly initialize the whole input conv while the
  # deeper backbone stays pretrained (with encoder_pretrained: true) — this
  # removes first-conv pretraining as a confound when comparing models with
  # different input-channel counts (e.g. k-band gate vs full B-band input).
  # Honored by the default SegmentationModel (mobilenetv2/v3/efficientnet) and the
  # SMP models; ignored by the custom topformer/seaformer/pidnet backbones.
  first_layer_pretrained: false
